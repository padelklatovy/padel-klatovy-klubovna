<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1210">
<title>PADEL KLATOVY · Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0e1210;--bg2:#161a17;--bg3:#1e2420;--card:#1a1f1c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --green:#3ddc84;--green-dim:#1f6e42;--green-dark:#0d3d24;
  --red:#ff6b6b;--red-dim:rgba(255,107,107,0.15);
  --amber:#ffc542;
  --text:#f0f4f1;--text2:#7a8c80;--text3:#4a5c50;
  --font:'Montserrat',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;--rs:8px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);height:100%;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;max-width:1024px;margin:0 auto;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-text{font-weight:800;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;}
.logo-sub{font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:1px;margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.clock{font-family:var(--mono);font-size:13px;color:var(--text2);}
.btn-sm{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--rs);padding:7px 12px;font-size:12px;font-family:var(--mono);color:var(--text2);cursor:pointer;}
.btn-sm:hover{border-color:var(--green);color:var(--green);}

/* SYNC */
.sync-bar{background:var(--bg3);border-bottom:0.5px solid var(--border);padding:4px 20px;font-family:var(--mono);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite;}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-family:var(--mono);letter-spacing:0.3px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;}
.tab span{display:block;font-size:17px;margin-bottom:2px;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}

/* SCREENS */
.screen{display:none;flex:1;overflow:hidden;flex-direction:column;}
.screen.active{display:flex;}

/* PIN OVERLAY */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.pin-overlay.show{display:flex;}
.pin-member-name{font-family:var(--font);font-weight:800;font-size:20px;letter-spacing:1px;color:var(--text);}
.pin-member-sub{font-family:var(--mono);font-size:12px;color:var(--text3);}
.pin-dots{display:flex;gap:14px;margin:6px 0;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--text3);transition:all 0.15s;}
.pin-dot.filled{background:var(--green);border-color:var(--green);}
.pin-error{font-family:var(--mono);font-size:12px;color:var(--red);height:16px;text-align:center;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.pin-btn{background:var(--card);border:0.5px solid var(--border2);border-radius:var(--r);padding:18px;font-family:var(--font);font-weight:700;font-size:22px;color:var(--text);cursor:pointer;text-align:center;transition:all 0.12s;user-select:none;}
.pin-btn:active{transform:scale(0.93);background:var(--green-dark);border-color:var(--green);}
.pin-btn.del{font-size:16px;color:var(--text2);}
.pin-cancel{font-family:var(--mono);font-size:12px;color:var(--text3);cursor:pointer;margin-top:4px;padding:8px 20px;}
.pin-cancel:hover{color:var(--text2);}

/* MEMBER BANNER */
.member-banner{display:none;align-items:center;gap:12px;background:var(--green-dark);border-bottom:0.5px solid var(--green-dim);padding:10px 20px;flex-shrink:0;}
.member-banner.show{display:flex;}
.mb-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
.mb-name{font-size:14px;font-weight:700;color:var(--green);flex:1;}
.mb-debt{font-family:var(--mono);font-size:12px;color:var(--text2);}
.mb-logout{font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;padding:6px 10px;border:0.5px solid var(--border);border-radius:6px;}
.mb-logout:hover{color:var(--red);border-color:var(--red);}

/* MEMBERS */
.search-bar{padding:12px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.search-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-family:var(--font);font-size:14px;}
.search-input:focus{outline:none;border-color:var(--green);}
.search-input::placeholder{color:var(--text3);}
.member-grid{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;overflow-y:auto;flex:1;}
.member-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:16px 10px 12px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative;user-select:none;}
.member-card:hover{border-color:var(--green-dim);transform:translateY(-1px);}
.member-card:active{transform:scale(0.97);}
.member-card.selected{border-color:var(--green);background:var(--green-dark);}
.av{width:50px;height:50px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;}
.member-name{font-size:13px;font-weight:600;color:var(--text);}
.member-family{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.member-bal{font-family:var(--mono);font-size:11px;margin-top:6px;font-weight:500;}
.bal-ok{color:var(--green);}.bal-warn{color:var(--amber);}.bal-danger{color:var(--red);}
.debt-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.3);}}

/* ORDER */
.order-layout{display:flex;flex:1;overflow:hidden;min-height:0;}
.product-panel{flex:1;overflow-y:auto;padding:14px;border-right:0.5px solid var(--border);}
.order-sidebar{width:220px;display:flex;flex-direction:column;padding:14px;background:var(--bg2);flex-shrink:0;min-height:0;}
.cart-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;flex-shrink:0;}
.cart-items{flex:1;overflow-y:auto;min-height:0;}
.cart-empty{font-size:12px;color:var(--text3);text-align:center;padding:20px 0;font-family:var(--mono);}
.cart-item{display:flex;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:12px;gap:6px;}
.ci-name{flex:1;color:var(--text);}
.ci-price{font-family:var(--mono);color:var(--green);font-size:12px;min-width:38px;text-align:right;}
.ci-del{color:var(--text3);cursor:pointer;font-size:15px;padding:2px 4px;background:none;border:none;}
.ci-del:hover{color:var(--red);}
.cart-bottom{flex-shrink:0;}
.cart-note{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--font);font-size:12px;resize:none;margin:8px 0;}
.cart-note:focus{outline:none;border-color:var(--green);}
.cart-note::placeholder{color:var(--text3);}
.cart-total{display:flex;justify-content:space-between;align-items:center;border-top:0.5px solid var(--border2);padding-top:8px;margin-top:4px;}
.ct-label{font-size:12px;color:var(--text2);font-family:var(--mono);}
.ct-amount{font-size:22px;font-weight:800;}
.btn-confirm{margin-top:8px;width:100%;background:var(--green);color:#0a1a10;border:none;border-radius:var(--rs);padding:13px;font-family:var(--font);font-weight:800;font-size:14px;cursor:pointer;}
.btn-confirm:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;}
.btn-repeat{margin-top:6px;width:100%;background:transparent;border:0.5px solid var(--green-dim);border-radius:var(--rs);padding:8px;font-size:12px;color:var(--green);cursor:pointer;font-family:var(--mono);display:none;}
.btn-clear{margin-top:6px;width:100%;background:transparent;border:0.5px solid var(--border);border-radius:var(--rs);padding:8px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--mono);}
.no-member{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text3);gap:10px;font-family:var(--mono);font-size:13px;}
.sel-pill{display:flex;align-items:center;gap:10px;background:var(--green-dark);border:0.5px solid var(--green-dim);border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;}
.sel-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.sel-name{font-size:13px;font-weight:600;color:var(--green);}
.sel-debt{font-size:11px;color:var(--text2);font-family:var(--mono);}
.cat-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin:14px 0 8px;}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.prod-btn{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rs);padding:12px 10px;cursor:pointer;text-align:left;transition:all 0.12s;display:flex;flex-direction:column;gap:3px;color:var(--text);}
.prod-btn:hover{border-color:var(--green-dim);background:var(--bg3);}
.prod-btn:active{transform:scale(0.96);background:var(--green-dark);}
.prod-emoji{font-size:20px;}
.prod-name{font-size:13px;font-weight:600;margin-top:2px;}
.prod-price{font-family:var(--mono);font-size:12px;color:var(--green);}

/* HISTORY */
.history-filters{padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:0.5px solid var(--border);background:var(--bg2);flex-shrink:0;}
.filter-btn{background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;font-family:var(--mono);color:var(--text2);cursor:pointer;}
.filter-btn.active{background:var(--green-dark);border-color:var(--green);color:var(--green);}
.history-list{flex:1;overflow-y:auto;padding:12px 14px;}
.hi{display:flex;align-items:center;gap:12px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.hi-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.hi-info{flex:1;min-width:0;}
.hi-name{font-size:13px;font-weight:600;}
.hi-items{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-note{font-size:11px;color:var(--amber);margin-top:2px;font-style:italic;}
.hi-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:3px;}
.hi-amt{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--red);flex-shrink:0;}

/* ADMIN */
.admin-scroll{flex:1;overflow-y:auto;padding:14px;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-box{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center;}
.stat-val{font-size:22px;font-weight:800;}
.stat-lbl{font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:4px;text-transform:uppercase;}
.section{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.section-hd{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-hd .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.debt-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.debt-row:last-child{border-bottom:none;}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.lb-row:last-child{border-bottom:none;}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.act-btn{display:flex;align-items:center;gap:7px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--rs);padding:10px 14px;font-size:12px;font-family:var(--mono);color:var(--text);cursor:pointer;}
.act-btn:hover{border-color:var(--green);color:var(--green);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s;padding:20px;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:380px;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;}
.modal-field{margin-bottom:12px;}
.modal-label{font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;}
.modal-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-family:var(--font);font-size:14px;}
.modal-input:focus{outline:none;border-color:var(--green);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.btn-primary{flex:1;background:var(--green);color:#0a1a10;border:none;border-radius:var(--rs);padding:12px;font-family:var(--font);font-weight:800;font-size:14px;cursor:pointer;}
.btn-cancel{flex:1;background:transparent;color:var(--text2);border:0.5px solid var(--border);border-radius:var(--rs);padding:12px;font-size:14px;cursor:pointer;font-family:var(--mono);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#0a1a10;padding:12px 22px;border-radius:30px;font-weight:800;font-size:13px;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:400;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);color:#fff;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px;}
</style>
</head>
<body>

<!-- PIN OVERLAY -->
<div class="pin-overlay" id="pin-overlay">
  <div id="pin-av-wrap"></div>
  <div class="pin-member-name" id="pin-member-name"></div>
  <div class="pin-member-sub" id="pin-member-sub">Zadej PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinPress('0')" style="grid-column:2">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-cancel" onclick="closePinOverlay()">Zrušit</div>
</div>

<!-- APP -->
<div class="app">
  <div class="topbar">
    <div class="logo">
      <img id="logo-img" style="width:42px;height:42px;object-fit:contain;flex-shrink:0" alt="PK">
      <div><div class="logo-text">Padel Klatovy</div><div class="logo-sub">BAR SYSTÉM</div></div>
    </div>
    <div class="topbar-right">
      <div class="clock" id="clock">--:--</div>
      <button class="btn-sm" id="admin-btn" onclick="handleAdminClick()">ADMIN</button>
    </div>
  </div>

  <div class="sync-bar"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">načítám…</span></div>

  <!-- MEMBER BANNER (zobrazí se po přihlášení) -->
  <div class="member-banner" id="member-banner">
    <div class="mb-av" id="mb-av"></div>
    <div>
      <div class="mb-name" id="mb-name"></div>
      <div class="mb-debt" id="mb-debt"></div>
    </div>
    <button class="mb-logout" onclick="logout()">Odhlásit</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-members" onclick="showTab('members')"><span>👥</span>členové</div>
    <div class="tab" id="tab-order" onclick="showTab('order')"><span>🛒</span>objednávka</div>
    <div class="tab" id="tab-history" onclick="showTab('history')"><span>📋</span>historie</div>
    <div class="tab" id="tab-admin" onclick="showTab('admin')"><span>⚙️</span>správa</div>
  </div>

  <div class="screen active" id="screen-members">
    <div class="search-bar"><input class="search-input" type="text" placeholder="🔍  Hledat člena…" id="member-search" oninput="filterMembers()" autocomplete="off"></div>
    <div class="member-grid" id="member-grid"></div>
  </div>

  <div class="screen" id="screen-order">
    <div class="order-layout">
      <div class="product-panel">
        <div class="no-member" id="no-member-msg"><div style="font-size:36px;opacity:0.4">←</div><div>Nejdříve vyber člena</div></div>
        <div id="products-container" style="display:none"></div>
      </div>
      <div class="order-sidebar">
        <div class="cart-label">KOŠÍK</div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-bottom">
          <textarea class="cart-note" id="cart-note" rows="2" placeholder="Poznámka…"></textarea>
          <div class="cart-total">
            <span class="ct-label">CELKEM</span>
            <span class="ct-amount" id="cart-total">0 Kč</span>
          </div>
          <button class="btn-confirm" id="btn-confirm" onclick="confirmOrder()" disabled>✓ ZAPSAT NA ÚČET</button>
          <button class="btn-repeat" id="btn-repeat" onclick="repeatLast()">↩ Opakovat poslední</button>
          <button class="btn-clear" onclick="clearOrder()">zrušit</button>
        </div>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-history">
    <div class="history-filters" id="history-filters"></div>
    <div class="history-list" id="history-list"></div>
  </div>

  <div class="screen" id="screen-admin">
    <div class="admin-scroll">
      <div class="stats-row" id="admin-stats"></div>
      <div class="section" id="admin-debts"></div>
      <div class="section" id="admin-lb"></div>
      <div class="section">
        <div class="section-hd"><div class="dot"></div>AKCE</div>
        <div class="actions">
          <button class="act-btn" onclick="showAddMember()">➕ Přidat člena</button>
          <button class="act-btn" onclick="showManageMembers()">✏️ Správa členů</button>
          <button class="act-btn" onclick="showTopUp()">💳 Dobít kredit</button>
          <button class="act-btn" onclick="showQR()">📲 QR kód</button>
          <button class="act-btn" onclick="showProducts()">🧾 Produkty</button>
          <button class="act-btn" onclick="exportCSV()">📥 Export CSV</button>
          <button class="act-btn" onclick="backupData()">💾 Záloha dat</button>
          <button class="act-btn" onclick="reloadData()">🔄 Sync</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-member">
  <div class="modal">
    <div class="modal-title">Nový člen</div>
    <div class="modal-field"><div class="modal-label">Jméno</div><input class="modal-input" id="new-name" placeholder="Jan Novák"></div>

function gc(m){return COLORS[(m.colorIdx||0)%COLORS.length];}
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
// PINy jsou ulozeny v Google Sheets jako SHA-256 hash
let pinsCache={};
function memberHasPin(id){return !!pinsCache[id];}
function getPins(){return pinsCache;}

async function hashPin(pin){
  const msgBuffer=new TextEncoder().encode('PADELKLATOVY:'+pin);
  const hashBuffer=await crypto.subtle.digest('SHA-256',msgBuffer);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function loadPins(){
  try{
    const res=await fetch(SCRIPT_URL+'?action=getPins&t='+Date.now());
    const data=await res.json();
    if(data.pins) pinsCache=data.pins;
  }catch(e){
    // keep existing cache on error
  }
}

async function savePin(memberId, pin){
  const hash=await hashPin(pin);
  pinsCache[memberId]=hash;
  await sync('setPin',{memberId, pin:hash});
}

function setSyncStatus(s,msg){
  document.getElementById('sync-dot').className='sync-dot '+s;
  document.getElementById('sync-text').textContent=msg;
}

async function loadData(){
  setSyncStatus('loading','načítám…');
  try{
    const res=await fetch(SCRIPT_URL+'?action=getAll&t='+Date.now());
    const data=await res.json();
    if(data.members&&data.members.length>0)members=data.members;
    products=(data.products&&Object.keys(data.products).length>0)?data.products:DEFAULT_PRODUCTS;
    transactions=data.transactions||[];
    if(data.pins) pinsCache=data.pins;
    setSyncStatus('ok','synchronizováno · '+new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    products=DEFAULT_PRODUCTS;
    setSyncStatus('err','offline');
  }
  renderMembers();
}

async function reloadData(){await loadData();renderHistory();renderAdmin();toast('🔄 Aktualizováno');}

async function sync(action,data){
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...data})});
    setSyncStatus('ok','synchronizováno · '+new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){setSyncStatus('err','chyba zápisu');}
}

// ── PIN ──
function openPinOverlay(member, mode){
  pinTarget=member; pinEntry=''; pinMode=mode;
  const c=gc(member);
  document.getElementById('pin-av-wrap').innerHTML=`<div style="width:60px;height:60px;border-radius:50%;background:${c.bg};color:${c.text};border:2px solid ${c.border};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px">${ini(member.name)}</div>`;
  document.getElementById('pin-member-name').textContent=member.nick||member.name.split(' ')[0];
  document.getElementById('pin-member-sub').textContent=mode==='setup'?'Nastav si 4místný PIN':mode==='setup2'?'Zadej PIN znovu pro potvrzení':'Zadej PIN';
  document.getElementById('pin-error').textContent='';
  updatePinDots();
  document.getElementById('pin-overlay').classList.add('show');
}

function closePinOverlay(){
  document.getElementById('pin-overlay').classList.remove('show');
  pinTarget=null; pinEntry=''; pinMode='verify';
}

function updatePinDots(){
  for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<pinEntry.length);
}

let pinSetupFirst='';

async function pinPress(d){
  if(pinEntry.length>=4) return;
  pinEntry+=d;
  updatePinDots();
  if(pinEntry.length===4){
    setTimeout(async ()=>{
      if(pinMode==='admin'){
        if(pinEntry===ADMIN_PIN){
          isAdmin=true;
          document.getElementById('admin-btn').textContent='✓ ADMIN';
          document.getElementById('admin-btn').style.borderColor='var(--green)';
          document.getElementById('admin-btn').style.color='var(--green)';
          const overlay=document.getElementById('pin-overlay');
          overlay.classList.remove('show');
          overlay.style.display='none';
          setTimeout(()=>{overlay.style.display='';},300);
          showTab('admin');
          toast('✓ Admin režim zapnut');
        } else {
          document.getElementById('pin-error').textContent='Špatný PIN';
          pinEntry='';updatePinDots();
        }
      } else if(pinMode==='verify'){
        const hash=await hashPin(pinEntry);
        if(hash===String(pinsCache[pinTarget.id])){
          loginMember(pinTarget);
        } else {
          document.getElementById('pin-error').textContent='Špatný PIN';
          pinEntry='';updatePinDots();
        }
      } else if(pinMode==='setup'){
        pinSetupFirst=pinEntry;
        pinEntry='';
        pinMode='setup2';
        document.getElementById('pin-member-sub').textContent='Zadej PIN znovu pro potvrzení';
        document.getElementById('pin-error').textContent='';
        updatePinDots();
      } else if(pinMode==='setup2'){
        if(pinEntry===pinSetupFirst){
          await savePin(pinTarget.id, pinEntry);
          loginMember(pinTarget);
          toast('✓ PIN nastaven');
        } else {
          document.getElementById('pin-error').textContent='PINy se neshodují — zkus znovu';
          pinEntry=''; pinSetupFirst=''; pinMode='setup';
          document.getElementById('pin-member-sub').textContent='Nastav si 4místný PIN';
          updatePinDots();
        }
      }
    },200);
  }
}

// ── MEMBERS ──
function filterMembers(){
  const q=document.getElementById('member-search').value.toLowerCase();
  renderMembers(members.filter(m=>m.name.toLowerCase().includes(q)||(m.nick||'').toLowerCase().includes(q)));

function renderMembers(list){
  // Auto-login if previously logged in
  if(!selectedMember && !list){
    const savedId=localStorage.getItem('pk_logged_in');
    if(savedId){
      const saved=members.find(m=>m.id===savedId);
      if(saved){ loginMember(saved); return; }
    }
  }
  const g=document.getElementById('member-grid');
  if(!list)list=members;
  if(!list.length){g.innerHTML='<p style="grid-column:1/-1;text-align:center;padding:40px;font-family:var(--mono);font-size:12px;color:var(--text3)">žádní členové · přidej v Správě</p>';return;}
  g.innerHTML=list.map(m=>{
    const c=gc(m),sel=selectedMember&&selectedMember.id===m.id;
    const high=(m.debt||0)>=DEBT_DANGER,warn=(m.debt||0)>=DEBT_WARN&&!high;
    const hasPin=memberHasPin(m.id);
    return`<div class="member-card${sel?' selected':''}" onclick="handleMemberClick('${m.id}')">
      ${high?'<div class="debt-dot"></div>':''}
      <div class="av" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${ini(m.name)}</div>
      <div class="member-name">${m.nick||m.name.split(' ')[0]}</div>
      <div class="member-family">${m.family||''}</div>
      <div class="member-bal ${high?'bal-danger':warn?'bal-warn':'bal-ok'}">${(m.debt||0)>0?'-'+(m.debt||0)+' Kč':'✓ bez dluhu'}</div>
      ${hasPin?'<div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:3px">🔒 PIN</div>':'<div style="font-size:9px;color:var(--amber);font-family:var(--mono);margin-top:3px">bez PINu</div>'}
    </div>`;
  }).join('');
}

async function handleMemberClick(id){
  const m=members.find(x=>x.id===id);

  await loadPins();
  if(memberHasPin(m.id)){
    openPinOverlay(m,'verify');
  } else {

  }

// ── CART ──
function addToCart(name,price,emoji){
  const ex=cart.find(i=>i.name===name);
  if(ex)ex.qty++;else cart.push({name,price,emoji,qty:1});
  renderCart();
}
function removeFromCart(idx){
  if(cart[idx].qty>1)cart[idx].qty--;else cart.splice(idx,1);
  renderCart();
}
function renderCart(){
  const con=document.getElementById('cart-items');
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  con.innerHTML=cart.length===0?'<div class="cart-empty">košík je prázdný</div>'
    :cart.map((i,idx)=>`<div class="cart-item">
      <span class="ci-name">${i.emoji} ${i.name}${i.qty>1?' ×'+i.qty:''}</span>
      <span class="ci-price">${i.price*i.qty} Kč</span>
      <button class="ci-del" onclick="removeFromCart(${idx})">−</button>
    </div>`).join('');
  document.getElementById('cart-total').textContent=total+' Kč';
  document.getElementById('btn-confirm').disabled=!cart.length||!selectedMember;
}

function repeatLast(){
  if(!selectedMember)return;
  const lastTx=transactions.find(t=>t.memberId===selectedMember.id);
  if(!lastTx)return;
  cart=[];
  const allP=Object.values(products).flat();
  lastTx.items.split(',').forEach(item=>{
    const qm=item.match(/×(\d+)/);const qty=qm?parseInt(qm[1]):1;
    const name=item.trim().replace(/^[\p{Emoji}\s]+/u,'').replace(/\s×\d+$/,'').trim();
    const p=allP.find(x=>x.name===name);
    if(p)for(let i=0;i<qty;i++)addToCart(p.name,p.price,p.emoji);
  });
  renderCart();toast('↩ Opakuji poslední objednávku');
}

async function confirmOrder(){
  if(!selectedMember||!cart.length)return;
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const itemStr=cart.map(i=>`${i.emoji} ${i.name}${i.qty>1?' ×'+i.qty:''}`).join(', ');
  const note=document.getElementById('cart-note').value.trim();
  const ts=new Date().toISOString();
  const tsL=new Date().toLocaleString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const m=members.find(x=>x.id===selectedMember.id);
  m.debt=(m.debt||0)+total;m.spent=(m.spent||0)+total;
  const txId='t'+Date.now();
  transactions.unshift({id:txId,memberId:selectedMember.id,member:selectedMember.name,items:itemStr,note,amount:total,ts:tsL});
  await sync('transaction',{transactionId:txId,memberId:selectedMember.id,memberName:selectedMember.name,items:itemStr,note,amount:total,timestamp:ts});
  toast(`✓ ${selectedMember.nick||selectedMember.name} · ${total} Kč`);
  document.getElementById('cart-note').value='';
  cart=[];renderCart();
  // Update banner
  document.getElementById('mb-debt').textContent=(m.debt||0)>0?'Dluh: '+(m.debt||0)+' Kč':'Bez dluhu ✓';
}

function clearOrder(){
  cart=[];renderCart();
  document.getElementById('cart-note').value='';
}

// ── HISTORY ──
function renderHistory(){
  const names=[...new Set(transactions.map(t=>t.member))];
  // Admin sees all, member sees own by default
  if(!isAdmin && selectedMember && historyFilter==='all'){
    historyFilter=selectedMember.name;
  }
  document.getElementById('history-filters').innerHTML=
    `<button class="filter-btn${historyFilter==='all'?' active':''}" onclick="setHF('all',this)">Všichni</button>`
    +names.map(n=>`<button class="filter-btn${historyFilter===n?' active':''}" onclick="setHF('${n}',this)">${n.split(' ')[0]}</button>`).join('');
  renderHistoryList();
}

function setHF(f,btn){
  historyFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderHistoryList();
}

function renderHistoryList(){
  const list=historyFilter==='all'?transactions:transactions.filter(t=>t.member===historyFilter);
  document.getElementById('history-list').innerHTML=list.length===0
    ?'<p style="color:var(--text3);text-align:center;padding:30px;font-family:var(--mono);font-size:12px">žádné záznamy</p>'
    :list.map(t=>{
      const m=members.find(x=>x.id===t.memberId)||{colorIdx:0};const c=gc(m);
      // Can delete only own transactions (or if no one logged in = admin view)
      const canDelete=isAdmin||(selectedMember&&selectedMember.id===t.memberId);
      return`<div class="hi">
        <div class="hi-av" style="background:${c.bg};color:${c.text}">${ini(t.member)}</div>
        <div class="hi-info">
          <div class="hi-name">${t.member}</div>
          <div class="hi-items">${t.items}</div>
          ${t.note?`<div class="hi-note">📝 ${t.note}</div>`:''}
          <div class="hi-time">${t.ts}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
          <div class="hi-amt">−${t.amount} Kč</div>
          ${canDelete?`<button onclick="deleteTx('${t.id}')" style="background:var(--red-dim);border:none;color:var(--red);border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;font-family:var(--mono)">smazat</button>`:''}
        </div>
      </div>`;
    }).join('');
}

async function deleteTx(id){
  const t=transactions.find(x=>x.id===id);
  if(!t||!confirm(`Smazat?\n${t.member} · ${t.items} · ${t.amount} Kč`))return;
  const m=members.find(x=>x.id===t.memberId);
  if(m){m.debt=Math.max(0,(m.debt||0)-t.amount);m.spent=Math.max(0,(m.spent||0)-t.amount);}
  transactions=transactions.filter(x=>x.id!==id);
  await sync('deleteTransaction',{transactionId:id,memberName:t.member,items:t.items,amount:t.amount,originalTs:t.ts,deletedAt:new Date().toISOString(),deletedAtLocal:new Date().toLocaleString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})});
  renderHistoryList();renderMembers();
  if(selectedMember) document.getElementById('mb-debt').textContent=(members.find(x=>x.id===selectedMember.id)?.debt||0)>0?'Dluh: '+members.find(x=>x.id===selectedMember.id).debt+' Kč':'Bez dluhu ✓';
  toast('🗑️ Smazáno');
}

// ── ADMIN ──
function renderAdmin(){
  const td=members.reduce((s,m)=>s+(m.debt||0),0);
  const ts=members.reduce((s,m)=>s+(m.spent||0),0);
  const id=members.filter(m=>(m.debt||0)>0).length;
  document.getElementById('admin-stats').innerHTML=`
    <div class="stat-box"><div class="stat-val" style="color:var(--red)">${td.toLocaleString('cs')} Kč</div><div class="stat-lbl">DLUHY</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--green)">${ts.toLocaleString('cs')} Kč</div><div class="stat-lbl">ÚTRATA</div></div>
    <div class="stat-box"><div class="stat-val">${id}</div><div class="stat-lbl">V DLUHU</div></div>`;
  const wd=[...members].filter(m=>(m.debt||0)>0).sort((a,b)=>b.debt-a.debt);
  document.getElementById('admin-debts').innerHTML=`<div class="section-hd"><div class="dot" style="background:var(--red)"></div>PŘEHLED DLUHŮ</div>`
    +(wd.map(m=>{const c=gc(m);const high=(m.debt||0)>=DEBT_DANGER;
      return`<div class="debt-row">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:${c.bg};color:${c.text};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">${ini(m.name)}</div>
          ${m.name}${high?' ⚠️':''}
        </div>
        <div style="font-family:var(--mono);font-size:13px;font-weight:500;color:${high?'var(--red)':'var(--amber)'}">${(m.debt||0).toLocaleString('cs')} Kč</div>
      </div>`;
    }).join(''))||'<p style="font-size:12px;color:var(--text3);font-family:var(--mono)">žádné dluhy 🎉</p>';
  const medals=['🥇','🥈','🥉','4','5'];
  const lb=[...members].sort((a,b)=>(b.spent||0)-(a.spent||0)).slice(0,5);
  document.getElementById('admin-lb').innerHTML=`<div class="section-hd"><div class="dot" style="background:var(--amber)"></div>LEADERBOARD</div>`
    +lb.map((m,i)=>{const c=gc(m);
      return`<div class="lb-row">
        <div style="width:22px;font-weight:800;color:var(--text3)">${medals[i]}</div>
        <div style="width:32px;height:32px;border-radius:50%;background:${c.bg};color:${c.text};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0">${ini(m.name)}</div>
        <div style="flex:1;font-size:13px">${m.name}</div>
        <div style="font-family:var(--mono);font-size:13px;color:var(--text2)">${(m.spent||0).toLocaleString('cs')} Kč</div>
        ${i===0?'<span>🏆</span>':''}
      </div>`;
    }).join('');
}

// ── MEMBER MANAGEMENT ──
function showAddMember(){openModal('modal-member');}
async function addMember(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){toast('Zadej jméno',true);return;}
  const nick=document.getElementById('new-nick').value.trim();
  const family=document.getElementById('new-family').value.trim();
  const m={id:'m'+Date.now(),name,nick:nick||name.split(' ')[0],family:family||name.split(' ')[1]||name,debt:0,spent:0,colorIdx:members.length%COLORS.length};
  members.push(m);
  await sync('addMember',m);
  renderMembers();closeModal('modal-member');
  ['new-name','new-nick','new-family'].forEach(id=>document.getElementById(id).value='');
  toast(`✓ ${name} přidán`);
}

function showManageMembers(){
  document.getElementById('manage-list').innerHTML=members.map((m,i)=>{const c=gc(m);
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)">
      <div style="width:36px;height:36px;border-radius:50%;background:${c.bg};color:${c.text};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0">${ini(m.name)}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${m.name}</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${m.family||''} · dluh: ${m.debt||0} Kč · ${pinsCache[m.id]?'🔒 PIN nastaven':'bez PINu'}</div>
      </div>
      <button onclick="resetMemberPin('${m.id}')" style="background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:11px;margin-right:4px" title="Reset PIN">🔑</button>
      <button onclick="editMember(${i})" style="background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px;margin-right:4px">✏️</button>
      <button onclick="deleteMember('${m.id}')" style="background:var(--red-dim);border:none;color:var(--red);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px">🗑️</button>
    </div>`;
  }).join('');
  openModal('modal-manage');
}

async function resetMemberPin(id){
  const m=members.find(x=>x.id===id);
  if(!m||!confirm(`Reset PIN pro ${m.name}?\nČlen si nastaví nový při příštím přihlášení.`))return;
  delete pinsCache[id];
  await sync('deletePin',{memberId:id});
  showManageMembers();
  toast(`🔑 PIN pro ${m.name} resetován`);
}

function editMember(i){
  const m=members[i];
  const n=prompt('Jméno:',m.name);if(!n)return;
  const nk=prompt('Přezdívka:',m.nick||'');
  const nf=prompt('Rodina:',m.family||'');
  members[i]={...m,name:n.trim(),nick:(nk||n.split(' ')[0]).trim(),family:(nf||'').trim()};
  sync('editMember',{id:m.id,name:members[i].name,nick:members[i].nick,family:members[i].family});
  showManageMembers();renderMembers();toast(`✓ ${n} upraven`);
}

async function deleteMember(id){
  const m=members.find(x=>x.id===id);
  if(!m||!confirm(`Smazat ${m.name}?`))return;
  members=members.filter(x=>x.id!==id);
  delete pinsCache[id];
  await sync('deletePin',{memberId:id});
  await sync('deleteMember',{id});
  showManageMembers();renderMembers();renderAdmin();toast(`🗑️ ${m.name} smazán`);
}

// ── TOP UP ──
function showTopUp(){
  document.getElementById('topup-member').innerHTML=members.map(m=>`<option value="${m.id}">${m.name}${(m.debt||0)>0?' — '+(m.debt||0)+' Kč':''}</option>`).join('');
  openModal('modal-topup');
}
async function topUp(){
  const mid=document.getElementById('topup-member').value;
  const amt=parseInt(document.getElementById('topup-amount').value);
  const method=document.getElementById('topup-method').value;
  if(!amt||amt<=0){toast('Zadej částku',true);return;}
  const m=members.find(x=>x.id===mid);
  m.debt=Math.max(0,(m.debt||0)-amt);
  await sync('payment',{memberId:mid,memberName:m.name,amount:amt,method,timestamp:new Date().toISOString()});
  closeModal('modal-topup');document.getElementById('topup-amount').value='';
  toast(`✓ Platba ${amt} Kč — ${m.name}`);renderMembers();renderAdmin();
}

function showProducts(){
  const all=Object.entries(products).flatMap(([cat,items])=>items.map(p=>({...p,cat})));
  document.getElementById('products-list').innerHTML=all.length===0
    ?'<p style="font-size:12px;color:var(--text3);font-family:var(--mono)">žádné produkty</p>'

      <span style="font-size:18px">${p.emoji}</span>
      <span style="flex:1">${p.name} <span style="color:var(--text3);font-size:11px;font-family:var(--mono)">${p.cat}</span></span>
      <span style="font-family:var(--mono);color:var(--green);min-width:50px;text-align:right">${p.price} Kč</span>

    </div>`).join('');

}
async function addProduct(){
  const name=document.getElementById('np-name').value.trim();
  const cat=document.getElementById('np-cat').value.trim()||'Ostatní';
  const price=parseInt(document.getElementById('np-price').value);
  const emoji=document.getElementById('np-emoji').value.trim()||'•';
  if(!name||!price){toast('Vyplň název a cenu',true);return;}
  if(!products[cat])products[cat]=[];
  products[cat].push({name,price,emoji});
  await sync('addProduct',{name,cat,price,emoji});
  ['np-name','np-price','np-emoji'].forEach(id=>document.getElementById(id).value='');
  showProducts();toast(`✓ ${name} přidán`);
}
async function deleteProduct(name,cat){
  if(!products[cat])return;
  products[cat]=products[cat].filter(p=>p.name!==name);
  if(!products[cat].length)delete products[cat];
  await sync('deleteProduct',{name,cat});
  showProducts();
}

// ── EXPORT ──
function backupData(){
  const now=new Date();
  const bom='\uFEFF';
  const pad=n=>String(n).padStart(2,'0');
  const dateStr=pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());
  const mR=[['ID','Jmeno','Prezdivka','Rodina','Dluh','Utrata','colorIdx']];
  members.forEach(function(m){mR.push([m.id,m.name,m.nick||'',m.family||'',m.debt||0,m.spent||0,m.colorIdx||0]);});
  const tR=[['ID','Clen','ClenID','Polozky','Castka','Poznamka','Cas']];
  transactions.forEach(function(t){tR.push([t.id,t.member,t.memberId,t.items,t.amount,t.note||'',t.ts]);});
  const pR=[['Kategorie','Nazev','Cena','Emoji']];
  Object.entries(products).forEach(function(e){var cat=e[0];e[1].forEach(function(p){pR.push([cat,p.name,p.price,p.emoji]);});});
  var csv=bom+'ZALOHA PADEL KLATOVY BAR\nDatum: '+dateStr+'\n\n=== CLENOVE ===\n'+mR.map(function(r){return r.join(';');}).join('\n')+'\n\n=== TRANSAKCE ===\n'+tR.map(function(r){return r.join(';');}).join('\n')+'\n\n=== PRODUKTY ===\n'+pR.map(function(r){return r.join(';');}).join('\n');
  var filename='padel-zaloha-'+now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+'.csv';
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=filename;
  a.click();
  toast('Zaloha stazena');
}

function exportCSV(){
  const bom='\uFEFF';
  const mR=[['Jméno','Dluh','Útrata']];members.forEach(m=>mR.push([m.name,m.debt||0,m.spent||0]));
  const tR=[['Člen','Položky','Kč','Poznámka','Čas']];transactions.forEach(t=>tR.push([t.member,t.items,t.amount,t.note||'',t.ts]));
  const csv=bom+'ČLENOVÉ\n'+mR.map(r=>r.join(';')).join('\n')+'\n\nTRANSAKCE\n'+tR.map(r=>r.join(';')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'})),download:'padel-klatovy-'+new Date().toISOString().slice(0,10)+'.csv'});
  a.click();toast('📥 CSV exportováno');
}
